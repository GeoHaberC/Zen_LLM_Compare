name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff bandit pyright pytest

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Bandit security
        run: bandit -r comparator_backend.py -ll -x __pycache__

      - name: Pyright type check
        run: pyright comparator_backend.py

      - name: Pytest
        run: pytest tests/ -v --tb=short
        env:
          PYTEST_BACKEND_SKIP_LLM: "1"
